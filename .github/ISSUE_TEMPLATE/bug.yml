name: Bug report
description: Report a reproducible AQB defect
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private benchmark cases, or personal data. Report vulnerabilities privately.
  - type: input
    id: version
    attributes: { label: AQB version, placeholder: v0.1.0 }
    validations: { required: true }
  - type: textarea
    id: reproduction
    attributes: { label: Minimal reproduction, description: Include redacted commands, inputs, and observed output. }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: dropdown
    id: deployment
    attributes: { label: Deployment, options: [Docker Compose, Local development, Other] }
    validations: { required: true }
