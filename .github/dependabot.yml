version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    groups:
      web-minor:
        update-types: [minor, patch]
  - package-ecosystem: pip
    directory: /
    schedule: { interval: weekly }
    groups:
      python-minor:
        update-types: [minor, patch]
  - package-ecosystem: docker
    directory: /apps/web
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/api
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/worker
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
